<!doctype html>
<html lang="en" data-bs-theme="auto">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Подключаем bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <!-- Подключаем шрифт мышиный -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
    <!-- Custom styles for this template -->
    <link href="sign-in.css" rel="stylesheet">

    <title>единомышЪ</title>

    <style type="text/css">
      body{
        font-family: 'Caveat', cursive;
        background-color: #777777;
        color: white;
      }
    </style>
    
  </head>
  <body class="d-flex align-items-center py-4">
    <main class="form-signin w-100 m-auto">
      <form>
        <img class="mb-4" src="img/mouse_logo.png" alt="" width="50%">
        <h1 class="h3 mb-3 fw-normal">Регистрация</h1>

        <div class="form-floating text-dark">
          <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
          <label for="floatingInput">Адресс мыша (почта)</label>
        </div>
        <div class="form-floating text-dark">
          <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
          <label for="floatingPassword">Мышроль</label>
        </div>

        <div class="form-check text-start my-3">
          <input class="form-check-input" type="checkbox" value="remember-me" id="flexCheckDefault">
          <label class="form-check-label" for="flexCheckDefault">
            Замышлять меня
          </label>
        </div>
        <button class="btn btn-outline-dark w-100 py-2" type="submit"><a href="main_page.html" style="text-decoration: none; color: white;">Создать аккаунт мыша</a></button>
      </form>
    </main>
</body>
</html>
